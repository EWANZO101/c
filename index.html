<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cioda's Commissions — Queue Full</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0c0c12;--surface:#13131c;--card:#1a1a24;--border:#2a2a38;
      --accent:#c084fc;--accent-g:rgba(192,132,252,0.14);
      --gold:#f59e0b;--text:#e8e6f0;--muted:#9694a8;--dim:#5f5d72;
      --danger:#ef4444;--success:#22c55e;--warning:#f59e0b;
    }
    body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;
         min-height:100vh;display:flex;flex-direction:column;align-items:center;
         justify-content:center;padding:1.25rem;overflow-x:hidden;}

    /* bg orbs */
    .orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.07;}
    .o1{width:500px;height:500px;background:#a855f7;top:-150px;left:-150px;animation:d1 14s ease-in-out infinite;}
    .o2{width:400px;height:400px;background:#f59e0b;bottom:-120px;right:-120px;animation:d2 18s ease-in-out infinite;}
    .o3{width:280px;height:280px;background:#6366f1;top:50%;left:50%;animation:d3 11s ease-in-out infinite;}
    @keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,40px)}}
    @keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-50px)}}
    @keyframes d3{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-40%,-60%)}}

    .card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);
          border-radius:22px;padding:clamp(1.75rem,5vw,2.75rem);width:100%;max-width:560px;
          text-align:center;animation:popIn .55s cubic-bezier(0.34,1.4,0.64,1) both;
          box-shadow:0 0 80px rgba(192,132,252,.06);}
    @keyframes popIn{from{opacity:0;transform:scale(.9) translateY(18px)}to{opacity:1;transform:scale(1) translateY(0)}}

    .icon{font-size:clamp(3rem,9vw,4rem);margin-bottom:.85rem;display:block;
          animation:bob 3s ease-in-out infinite;}
    @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-10px) rotate(3deg)}}

    .stars{font-size:1rem;letter-spacing:.25em;color:var(--gold);margin-bottom:.7rem;display:block;
           animation:twinkle 3s ease-in-out infinite;}
    @keyframes twinkle{0%,100%{opacity:1}50%{opacity:.5}}

    .badge{display:inline-flex;align-items:center;gap:.45rem;
           background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
           color:#fca5a5;border-radius:999px;padding:.3rem .9rem;
           font-family:'Cinzel',serif;font-size:.72rem;font-weight:700;
           letter-spacing:.06em;margin-bottom:1.25rem;}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--danger);
         animation:pdot 1.5s ease-in-out infinite;}
    @keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.5)}}

    h1{font-family:'Cinzel',serif;font-size:clamp(1.5rem,5vw,2.1rem);font-weight:700;
       background:linear-gradient(135deg,#e8e6f0 0%,#c084fc 55%,#f59e0b 100%);
       -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
       margin-bottom:.45rem;line-height:1.2;}
    .sub{font-size:clamp(.88rem,2.5vw,1rem);color:var(--muted);font-style:italic;
         line-height:1.6;margin-bottom:1.5rem;}

    /* ── COUNTDOWN RING ── */
    .ring-wrap{display:flex;justify-content:center;margin-bottom:1.5rem;}
    .ring-rel{position:relative;width:110px;height:110px;}
    .rsv{transform:rotate(-90deg);width:110px;height:110px;}
    .rb{fill:none;stroke:#1e1e2e;stroke-width:7;}
    .rf{fill:none;stroke:var(--accent);stroke-width:7;stroke-linecap:round;
        stroke-dasharray:311;transition:stroke-dashoffset 1s linear,stroke .5s;}
    .rf.urgent{stroke:var(--danger);}
    .rc{position:absolute;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;font-family:'Cinzel',serif;pointer-events:none;}
    .rn{font-size:1.7rem;font-weight:700;color:var(--accent);line-height:1;transition:color .5s;}
    .rn.urgent{color:var(--danger);}
    .rl{font-size:.55rem;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;margin-top:.1rem;}

    /* ── LIVE SLOTS PANEL ── */
    .live-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;
                padding:1.1rem 1rem;margin-bottom:1.5rem;transition:border-color .4s,box-shadow .4s;}
    .live-panel.has-slots{border-color:var(--success);box-shadow:0 0 20px rgba(34,197,94,.1);}
    .live-header{display:flex;align-items:center;justify-content:space-between;
                 margin-bottom:.85rem;flex-wrap:wrap;gap:.4rem;}
    .live-title{font-family:'Cinzel',serif;font-size:.7rem;color:var(--muted);
                letter-spacing:.08em;text-transform:uppercase;
                display:flex;align-items:center;gap:.4rem;}
    .ldot{width:8px;height:8px;border-radius:50%;background:var(--success);
          animation:pdot 2s ease-in-out infinite;display:inline-block;}
    .last-update{font-size:.68rem;color:var(--dim);font-style:italic;}
    /* Slot cards grid */
    .slot-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:.9rem;}
    .sb{border-radius:10px;padding:10px 4px 8px;text-align:center;
        border:1.5px solid transparent;transition:all .35s;}
    .sb.used{background:#1c1c2e;border-color:#2a2a3e;}
    .sb.free{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.35);
             animation:freePulse 2.5s ease-in-out infinite;}
    @keyframes freePulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}
                         50%{box-shadow:0 0 0 6px rgba(34,197,94,.12)}}
    .sb-icon{width:28px;height:28px;border-radius:50%;margin:0 auto 5px;
             display:flex;align-items:center;justify-content:center;
             font-size:13px;font-weight:700;}
    .sb.used .sb-icon{background:#2e2e42;color:#9694a8;}
    .sb.free .sb-icon{background:rgba(34,197,94,.18);color:var(--success);}
    .sb-lbl{font-size:.58rem;letter-spacing:.05em;text-transform:uppercase;
            font-family:'Cinzel',serif;}
    .sb.used .sb-lbl{color:#5f5d72;}
    .sb.free .sb-lbl{color:var(--success);}
    /* Summary stats */
    .slot-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:.75rem;}
    .ss{background:#0c0c12;border:1px solid var(--border);border-radius:10px;
        padding:.6rem .5rem;text-align:center;transition:all .35s;}
    .ss.free-box{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.25);}
    .ss.full-box{background:rgba(239,68,68,.06);border-color:rgba(239,68,68,.2);}
    .ss-num{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;line-height:1;}
    .ss-lbl{font-size:.6rem;color:#5f5d72;letter-spacing:.07em;text-transform:uppercase;margin-top:3px;}

    /* Status message */
    .live-msg{border-radius:8px;padding:.6rem .85rem;font-size:.85rem;
              font-style:italic;transition:all .4s;min-height:2.4rem;
              display:flex;align-items:center;justify-content:center;gap:.4rem;}
    .live-msg.full{background:rgba(239,68,68,.08);color:#fca5a5;}
    .live-msg.open{background:rgba(34,197,94,.1);color:#86efac;font-weight:600;
                   animation:msgPop .4s ease;}
    .live-msg.connecting{background:var(--bg);color:var(--dim);}
    @keyframes msgPop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

    /* CTA */
    .btn-try{display:inline-flex;align-items:center;gap:.5rem;
             background:var(--accent);color:#fff;border:none;border-radius:10px;
             padding:.7rem 1.75rem;font-family:'Cinzel',serif;font-size:.9rem;
             font-weight:700;letter-spacing:.04em;cursor:pointer;text-decoration:none;
             transition:all .2s;margin-bottom:1.5rem;border:2px solid transparent;}
    .btn-try:hover{background:#a855f7;box-shadow:0 0 30px var(--accent-g);transform:translateY(-2px);}
    .btn-try.highlight{border-color:var(--success);animation:btnGlow 1.5s ease-in-out infinite;}
    @keyframes btnGlow{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}
                       50%{box-shadow:0 0 20px rgba(34,197,94,.35)}}

    hr{border:none;border-top:1px solid var(--border);margin:1.1rem 0;}
    .contact{display:flex;flex-wrap:wrap;justify-content:center;gap:.85rem;
             font-size:.83rem;color:var(--muted);}
    .contact a{color:var(--accent);text-decoration:none;}
    .contact a:hover{text-decoration:underline;}

    @keyframes flash{0%{opacity:1}40%{opacity:.4}100%{opacity:1}}
    .flash-update{animation:flash .4s ease;}
    @media(max-width:380px){
      .ring-rel,.rsv{width:90px;height:90px;}
      .rn{font-size:1.4rem;}
      .slot-grid{gap:.3rem;}
    }
  </style>
</head>
<body>
  <div class="orbs">
    <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  </div>

  <div class="card">
    <span class="stars">⭐ ✨ ⭐</span>
    <span class="icon">🌊</span>
    <div class="badge"><div class="dot"></div>QUEUE FULL — OVERFLOW</div>

    <h1>We're Packed!</h1>
    <p class="sub">
      All slots are taken. You'll be sent back automatically in
      <strong id="timeLabel" style="color:var(--accent);-webkit-text-fill-color:var(--accent);">5:00</strong>.
    </p>

    <!-- Countdown ring -->
    <div class="ring-wrap">
      <div class="ring-rel">
        <svg class="rsv" viewBox="0 0 110 110">
          <circle class="rb" cx="55" cy="55" r="49.5"/>
          <circle class="rf" id="rf" cx="55" cy="55" r="49.5" stroke-dashoffset="0"/>
        </svg>
        <div class="rc">
          <div class="rn" id="rn">5:00</div>
          <div class="rl" id="rl">remaining</div>
        </div>
      </div>
    </div>

    <!-- Live slots panel -->
    <div class="live-panel" id="livePanel">
      <div class="live-header">
        <div class="live-title"><div class="ldot"></div>LIVE SLOT STATUS</div>
        <div class="last-update" id="lastUpdate">checking…</div>
      </div>

      <div class="slot-grid" id="slotGrid"></div>

      <div class="slot-stats">
        <div class="ss" id="ssUsed">
          <div class="ss-num" id="nOnForm" style="color:var(--text);">–</div>
          <div class="ss-lbl">In Use</div>
        </div>
        <div class="ss" id="ssWait">
          <div class="ss-num" id="nWaiting" style="color:var(--muted);">–</div>
          <div class="ss-lbl">In Queue</div>
        </div>
        <div class="ss" id="ssFree">
          <div class="ss-num" id="nFree" style="color:var(--success);">–</div>
          <div class="ss-lbl">Free Now</div>
        </div>
      </div>

      <div class="live-msg connecting" id="liveMsg">
        <span>⏳</span><span>Connecting to slot server…</span>
      </div>
    </div>

    <!-- CTA -->
    <a href="https://order.ciodrawz.space/queue/waiting" class="btn-try" id="tryBtn">
      🔄 Try the Queue Now
    </a>

    <hr>
    <div class="contact">
      <span>💬 <strong style="color:var(--text);">totallynotcioda</strong></span>
      <span>✉️ <a href="mailto:ciodrawz@opslabsystems.cloud">ciodrawz@opslabsystems.cloud</a></span>
      <span>🌐 <a href="https://order.ciodrawz.space">Main Site</a></span>
    </div>
  </div>

  <script>
    const TOTAL   = 300;          // 5 minutes in seconds
    const CIRCUM  = 311;          // 2 * PI * 49.5
    const API     = 'https://order.ciodrawz.space/api/slots';
    const QUEUE   = 'https://order.ciodrawz.space/queue/waiting';
    const MAX_S   = 5;

    let secsLeft  = TOTAL;
    let pollTimer = null;
    let hasFree   = false;

    // ── Countdown ─────────────────────────────────────────────────────────────
    function fmt(s){ return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }

    setInterval(() => {
      if (secsLeft <= 0) { window.location.href = QUEUE; return; }
      secsLeft--;
      const label = fmt(secsLeft);
      document.getElementById('timeLabel').textContent = label;
      document.getElementById('rn').textContent        = label;
      const offset = (1 - secsLeft / TOTAL) * CIRCUM;
      document.getElementById('rf').style.strokeDashoffset = offset;
      const urgent = secsLeft < 60;
      document.getElementById('rf').classList.toggle('urgent', urgent);
      document.getElementById('rn').classList.toggle('urgent', urgent);
      if (secsLeft === 0) document.getElementById('rl').textContent = 'redirecting…';
    }, 1000);

    // ── Render slot grid ──────────────────────────────────────────────────────
    function renderGrid(onForm) {
      const g = document.getElementById('slotGrid');
      g.innerHTML = '';
      for (let i = 0; i < MAX_S; i++) {
        const used = i < onForm;
        const el   = document.createElement('div');
        el.className = 'sb ' + (used ? 'used' : 'free');
        el.title     = used ? 'Slot ' + (i+1) + ' — in use' : 'Slot ' + (i+1) + ' — available';
        // Icon circle
        const ic = document.createElement('div');
        ic.className   = 'sb-icon';
        ic.textContent = used ? (i+1) : '✓';
        // Label
        const lbl = document.createElement('div');
        lbl.className   = 'sb-lbl';
        lbl.textContent = used ? 'Active' : 'Open';
        el.appendChild(ic);
        el.appendChild(lbl);
        g.appendChild(el);
      }
      // Flash the grid to show live update
      g.classList.remove('flash-update');
      void g.offsetWidth;
      g.classList.add('flash-update');
    }

    // ── Fetch + update UI ─────────────────────────────────────────────────────
    async function fetchSlots() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

      try {
        const res  = await fetch(API, {cache:'no-store'});
        const d    = await res.json();

        renderGrid(d.on_form);
        document.getElementById('nOnForm').textContent  = d.on_form;
        document.getElementById('nWaiting').textContent = d.waiting;
        document.getElementById('nFree').textContent    = d.free_slots;
        // Update free stat box colour
        const ssFree = document.getElementById('ssFree');
        const nFreeEl = document.getElementById('nFree');
        if (d.free_slots > 0) {
          ssFree.className = 'ss free-box';
          nFreeEl.style.color = 'var(--success)';
        } else {
          ssFree.className = 'ss full-box';
          nFreeEl.style.color = 'var(--danger)';
        }
        const ldot = document.querySelector('.ldot');
        ldot.style.background = 'var(--success)';
        document.getElementById('lastUpdate').textContent = `Live · ${timeStr}`;

        const panel  = document.getElementById('livePanel');
        const msg    = document.getElementById('liveMsg');
        const tryBtn = document.getElementById('tryBtn');

        hasFree = d.free_slots > 0 && !d.queue_full;

        if (!d.commissions_open) {
          panel.classList.remove('has-slots');
          msg.className = 'live-msg full';
          msg.innerHTML = '<span>🔒</span><span>Commissions are currently closed.</span>';
          tryBtn.classList.remove('highlight');
        } else if (hasFree) {
          panel.classList.add('has-slots');
          msg.className = 'live-msg open';
          const pl = d.free_slots > 1 ? 'slots' : 'slot';
          msg.innerHTML = `<span>✅</span><span>${d.free_slots} ${pl} just opened — click the button!</span>`;
          tryBtn.classList.add('highlight');
        } else if (d.queue_full) {
          panel.classList.remove('has-slots');
          msg.className = 'live-msg full';
          msg.innerHTML = `<span>🚦</span><span>Queue still full — ${d.waiting} waiting. Sit tight.</span>`;
          tryBtn.classList.remove('highlight');
        } else {
          panel.classList.remove('has-slots');
          msg.className = 'live-msg full';
          msg.innerHTML = `<span>⏳</span><span>All ${MAX_S} slots in use — checking every 5 seconds.</span>`;
          tryBtn.classList.remove('highlight');
        }

      } catch (e) {
        document.querySelector('.ldot').style.background = 'var(--danger)';
        document.getElementById('lastUpdate').textContent = `Retrying at ${timeStr}…`;
        document.getElementById('liveMsg').className = 'live-msg connecting';
        document.getElementById('liveMsg').innerHTML = '<span>📡</span><span>Reconnecting to slot server…</span>';
      }
    }

    // Start live polling immediately — no delay
    renderGrid(MAX_S);
    fetchSlots();
    pollTimer = setInterval(fetchSlots, 3000);
  </script>
</body>
</html>
